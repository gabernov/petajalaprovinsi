<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peta Jalan Provinsi Jawa Barat</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.11.0/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@5.11.0/dist/maplibre-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0f172a; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    /* Loading overlay */
    #loading {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(15, 23, 42, 0.95);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: #e2e8f0; font-size: 14px;
    }
    #loading.hidden { display: none; }
    #loading .spinner {
      width: 40px; height: 40px; border: 3px solid #334155;
      border-top-color: #38bdf8; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading .error { color: #ef4444; margin-top: 12px; font-size: 12px; max-width: 500px; text-align: center; word-break: break-all; }
    #loading .status { color: #94a3b8; margin-top: 8px; font-size: 12px; }

    /* Drop overlay */
    #drop-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(15, 23, 42, 0.92);
      justify-content: center; align-items: center;
    }
    #drop-overlay.active { display: flex; }
    #drop-overlay .box {
      border: 3px dashed #38bdf8; border-radius: 16px; padding: 60px 80px;
      text-align: center; color: #e2e8f0;
    }
    #drop-overlay .box h2 { font-size: 24px; margin-bottom: 8px; color: #38bdf8; }
    #drop-overlay .box p { font-size: 14px; color: #94a3b8; }

    /* Search bar */
    #search-bar {
      position: absolute; top: 12px; right: 12px; z-index: 20;
      width: 340px;
    }
    #search-box {
      position: relative; background: #1e293b;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #search-box.has-focus { box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 2px #38bdf8; }
    #search-input {
      width: 100%; padding: 12px 14px 12px 36px; font-size: 13px;
      background: transparent; color: #e2e8f0;
      border: none; outline: none;
    }
    #search-input::placeholder { color: #64748b; }
    #search-input-icon {
      position: absolute; top: 0; left: 0; width: 36px; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: #64748b; font-size: 14px; pointer-events: none;
    }
    #search-dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #0f172a; border-top: 1px solid #334155;
      border-radius: 0 0 10px 10px;
      max-height: 280px; overflow-y: auto; display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .search-item {
      padding: 10px 14px; cursor: pointer; font-size: 12px;
      border-bottom: 1px solid #1e293b; transition: background 0.1s;
    }
    .search-item:hover { background: #1e293b; }
    .search-item .s-name { color: #e2e8f0; font-weight: 500; }
    .search-item .s-meta { color: #64748b; font-size: 11px; margin-top: 2px; }
    .search-item .s-uptd {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 10px; font-weight: 600; margin-left: 4px;
    }
    .search-empty { padding: 14px; text-align: center; color: #64748b; font-size: 12px; }
    #search-dropdown::-webkit-scrollbar { width: 4px; }
    #search-dropdown::-webkit-scrollbar-track { background: transparent; }
    #search-dropdown::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    /* Sidebar */
    #panel {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: #1e293b; color: #e2e8f0;
      border-radius: 12px; width: 260px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4); overflow: hidden;
    }
    #panel-header {
      background: #0f172a; padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #334155;
    }
    #panel-header .icon { font-size: 20px; }
    #panel-header h1 { font-size: 13px; font-weight: 600; }
    #panel-header .badge {
      margin-left: auto; background: #38bdf8; color: #0f172a;
      padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
    }
    #panel-body { padding: 12px 14px; max-height: calc(100vh - 60px); overflow-y: auto; }

    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #64748b; margin-bottom: 6px;
    }

    #file-drop {
      border: 2px dashed #334155; border-radius: 8px;
      padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    #file-drop:hover { border-color: #38bdf8; background: rgba(56,189,248,0.05); }
    #file-drop.loaded { border-color: #22c55e; background: rgba(34,197,94,0.08); }
    #file-drop p { font-size: 11px; color: #94a3b8; }
    #file-drop .status { font-size: 10px; margin-top: 4px; }
    #file-drop .status.ok { color: #22c55e; }
    #file-drop .status.err { color: #ef4444; }
    #file-drop .status.loading { color: #fbbf24; }

    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .slider-row label { font-size: 12px; color: #94a3b8; min-width: 90px; }
    .slider-row input[type="range"] { flex: 1; accent-color: #38bdf8; }
    .slider-row .val {
      font-size: 13px; font-weight: 600; color: #38bdf8;
      min-width: 50px; text-align: right;
    }
    #filter-count { font-size: 12px; color: #94a3b8; margin-top: 6px; }
    #filter-count strong { color: #38bdf8; }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .stat-card {
      background: #0f172a; border-radius: 6px; padding: 8px 10px;
      border: 1px solid #334155;
    }
    .stat-card .label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 16px; font-weight: 700; color: #e2e8f0; margin-top: 1px; }
    .stat-card .value.blue { color: #38bdf8; }
    .stat-card .value.green { color: #22c55e; }

    .uptd-list { display: flex; flex-direction: column; gap: 4px; }
    .uptd-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; border-radius: 5px;
      background: #0f172a; border: 1px solid #334155;
      cursor: pointer; transition: all 0.15s;
    }
    .uptd-item:hover { border-color: #475569; }
    .uptd-item input { accent-color: var(--uptd-color); width: 12px; height: 12px; }
    .uptd-item .color-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--uptd-color); flex-shrink: 0;
    }
    .uptd-item .name { font-size: 11px; flex: 1; }
    .uptd-item .count { font-size: 10px; color: #64748b; }

    /* Toggle switch */
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #334155; border-radius: 20px; transition: 0.2s;
    }
    .toggle .toggle-slider::before {
      content: ""; position: absolute; height: 14px; width: 14px;
      left: 3px; bottom: 3px; background: #e2e8f0; border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #38bdf8; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
    #slider-row.disabled { opacity: 0.35; pointer-events: none; }

    #legend {
      position: absolute; bottom: 80px; left: 12px; z-index: 10;
      background: #1e293b; color: #e2e8f0;
      border-radius: 8px; padding: 10px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3); font-size: 10px;
    }
    #legend h4 { font-size: 10px; font-weight: 600; margin-bottom: 6px; color: #94a3b8; }
    .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .legend-color { width: 16px; height: 3px; border-radius: 2px; }
    .legend-gradient { width: 100%; height: 10px; border-radius: 4px; margin: 6px 0 4px; }
    .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; }

    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .maplibregl-popup-content {
      background: #1e293b !important; color: #e2e8f0 !important;
      border-radius: 8px !important; padding: 10px 14px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
      font-family: 'Inter', system-ui, sans-serif !important;
      font-size: 12px !important; max-width: 280px;
    }
    .maplibregl-popup-content b { color: #38bdf8; }
    .maplibregl-popup-tip { border-top-color: #1e293b !important; }
    .maplibregl-popup-close-button { color: #94a3b8 !important; font-size: 16px !important; }

    /* Coordinate marker */
    .coord-marker {
      width: 20px; height: 20px; border-radius: 50%;
      background: #ef4444; border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      cursor: pointer; position: relative;
    }
    .coord-marker::after {
      content: ''; position: absolute; bottom: -8px; left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent; border-right: 6px solid transparent;
      border-top: 8px solid white;
    }

    #theme-btn {
      background: #334155; border: none; border-radius: 10px;
      padding: 2px 8px; cursor: pointer; font-size: 12px;
      color: #94a3b8; transition: all 0.2s; line-height: 16px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    #theme-btn:hover { background: #475569; color: #e2e8f0; }
    body.light #theme-btn { background: #e2e8f0; color: #475569; }
    body.light #theme-btn:hover { background: #cbd5e1; }

    /* Light mode overrides */
    body.light { background: #f1f5f9; }
    body.light #panel { background: #ffffff; color: #1e293b; border: 1px solid #e2e8f0; }
    body.light #panel-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    body.light .stat-card { background: #f8fafc; border-color: #e2e8f0; }
    body.light .stat-card .label { color: #64748b; }
    body.light .stat-card .value { color: #1e293b; }
    body.light .uptd-item { background: #f8fafc; border-color: #e2e8f0; }
    body.light #file-drop { border-color: #cbd5e1; }
    body.light #file-drop p { color: #64748b; }
    body.light #legend { background: #ffffff; color: #1e293b; border: 1px solid #e2e8f0; }
    body.light #legend h4 { color: #64748b; }
    body.light #search-box { background: #ffffff; border: 1px solid #e2e8f0; }
    body.light #search-input { color: #1e293b; }
    body.light #search-input::placeholder { color: #94a3b8; }
    body.light #search-dropdown { background: #ffffff; border-color: #e2e8f0; border-radius: 0 0 10px 10px; }
    body.light .search-item { border-color: #f1f5f9; }
    body.light .search-item:hover { background: #f8fafc; }
    body.light .search-item .s-name { color: #1e293b; }
    body.light .search-item .s-meta { color: #64748b; }
    body.light .maplibregl-popup-content { background: #ffffff !important; color: #1e293b !important; }
    body.light .maplibregl-popup-content b { color: #0284c7; }
    body.light .maplibregl-popup-tip { border-top-color: #ffffff !important; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Loading WASM modules...</div>
  <div class="status" id="load-status"></div>
  <div class="error" id="load-error"></div>
</div>

<div id="map"></div>

<div id="search-bar">
  <div id="search-box">
    <span id="search-input-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Cari jalan / kode / koordinat..." autocomplete="off" />
    <div id="search-dropdown" style="display:none;"></div>
  </div>
</div>

<div id="drop-overlay">
  <div class="box">
    <h2>Drop .parquet file here</h2>
    <p>ruas_jalan.parquet</p>
  </div>
</div>

<div id="panel" style="display:none;">
  <div id="panel-header">
    <span class="icon">🛣️</span>
    <h1>Peta Jalan Provinsi Jabar</h1>
    <button id="theme-btn" title="Toggle dark/light mode">🌙</button>
    <span class="badge" id="road-badge">0</span>
  </div>
  <div id="panel-body">
    <div class="stats-row">
      <div class="stat-card"><div class="label">Total Ruas</div><div class="value" id="stat-roads">0</div></div>
      <div class="stat-card"><div class="label">Total KM</div><div class="value blue" id="stat-km">0</div></div>
      <div class="stat-card"><div class="label">UPTD Active</div><div class="value green" id="stat-uptd">0</div></div>
      <div class="stat-card"><div class="label">Kab/Kota</div><div class="value" id="stat-kab">0</div></div>
    </div>
    <div class="section">
      <div class="section-title">Data File</div>
      <div id="file-drop">
        <p>Drag & drop <strong>ruas_jalan.parquet</strong></p>
        <p style="margin-top:3px;font-size:10px;color:#64748b;">or click to select</p>
        <input type="file" id="file-input" accept=".parquet" style="display:none;" />
        <div class="status" id="file-status"></div>
      </div>
    </div>
    <div class="section" id="uptd-section" style="display:none;">
      <div class="section-title">UPTD</div>
      <div class="uptd-list" id="uptd-list"></div>
    </div>
  </div>
</div>

<div id="legend" style="display:none;">
  <h4>Legend - UPTD</h4>
  <div id="legend-roads"></div>
</div>

<script type="module">
  // ═══════════════════════════════════════════════════════════
  // STEP 1: IMPORT DEPENDENCIES (matching geoparquet-visualizer)
  // ═══════════════════════════════════════════════════════════
  const $ = id => document.getElementById(id);
  const loadStatus = $("load-status");
  const loadError = $("load-error");

  loadStatus.textContent = "Loading Apache Arrow from esm.sh...";
  let arrow;
  try {
    arrow = await import("https://esm.sh/apache-arrow");
    console.log("Arrow loaded");
  } catch (e) {
    loadError.textContent = "Failed to load Apache Arrow: " + e.message;
    throw e;
  }

  loadStatus.textContent = "Loading parquet-wasm from jsdelivr...";
  let parquet;
  try {
    parquet = await import("https://cdn.jsdelivr.net/npm/parquet-wasm@0.7.0/esm/parquet_wasm.js");
    console.log("parquet-wasm module loaded, exports:", Object.keys(parquet));
  } catch (e) {
    loadError.textContent = "Failed to load parquet-wasm: " + e.message;
    throw e;
  }

  loadStatus.textContent = "Initializing WASM binary...";
  try {
    // Exactly like geoparquet-visualizer: await parquet.default()
    await parquet.default();
    console.log("parquet-wasm initialized via parquet.default()");
  } catch (e) {
    // Fallback: try initSync with explicit WASM compilation
    console.warn("parquet.default() failed, trying initSync fallback:", e.message);
    try {
      const wasmResp = await fetch("https://cdn.jsdelivr.net/npm/parquet-wasm@0.7.0/esm/parquet_wasm_bg.wasm");
      const wasmBytes = await wasmResp.arrayBuffer();
      const wasmModule = await WebAssembly.compile(wasmBytes);
      parquet.initSync(wasmModule);
      console.log("parquet-wasm initialized via initSync()");
    } catch (e2) {
      loadError.textContent = "Failed to init WASM: " + e.message + " | " + e2.message;
      throw e2;
    }
  }

  loadStatus.textContent = "WASM ready. Waiting for data...";

  // ═══════════════════════════════════════════════════════════
  // STEP 2: WKB PARSER (from geoparquet-visualizer)
  // ═══════════════════════════════════════════════════════════
  function parseWKB(wkbBuffer) {
    try {
      const view = new DataView(wkbBuffer);
      let offset = 0;
      const byteOrder = view.getUint8(offset++);
      const littleEndian = byteOrder === 1;
      const geomType = view.getUint32(offset, littleEndian);
      offset += 4;
      const actualGeomType = geomType & 0xFF;

      function readPoint() {
        const x = view.getFloat64(offset, littleEndian); offset += 8;
        const y = view.getFloat64(offset, littleEndian); offset += 8;
        return [x, y];
      }
      function readPoints() {
        const n = view.getUint32(offset, littleEndian); offset += 4;
        return Array.from({ length: n }, readPoint);
      }
      function readLinearRing() {
        const n = view.getUint32(offset, littleEndian); offset += 4;
        return Array.from({ length: n }, readPoint);
      }
      function readPolygonRings() {
        const n = view.getUint32(offset, littleEndian); offset += 4;
        return Array.from({ length: n }, readLinearRing);
      }

      switch (actualGeomType) {
        case 1:  return { type: "Point", coordinates: readPoint() };
        case 2:  return { type: "LineString", coordinates: readPoints() };
        case 3:  return { type: "Polygon", coordinates: readPolygonRings() };
        case 4:  return { type: "MultiPoint", coordinates: readPoints() };
        case 5: {
          const n = view.getUint32(offset, littleEndian); offset += 4;
          const lines = [];
          for (let i = 0; i < n; i++) {
            offset++; offset += 4; // skip sub-entity WKB header
            lines.push(readPoints());
          }
          return { type: "MultiLineString", coordinates: lines };
        }
        case 6: {
          const n = view.getUint32(offset, littleEndian); offset += 4;
          const polygons = [];
          for (let i = 0; i < n; i++) {
            offset++; offset += 4; // skip sub-entity WKB header
            polygons.push(readPolygonRings());
          }
          return { type: "MultiPolygon", coordinates: polygons };
        }
        default:
          return null;
      }
    } catch (e) {
      console.error("WKB parse error:", e);
      return null;
    }
  }

  // ═══════════════════════════════════════════════════════════
  // STEP 3: PARQUET → GEOJSON (streaming, like geoparquet-visualizer)
  // ═══════════════════════════════════════════════════════════
  async function loadParquetToGeoJSON(source, onProgress) {
    const sourceName = source instanceof File ? source.name : source;
    let file;

    if (source instanceof File) {
      file = source;
    } else {
      // Fetch the file from URL
      const resp = await fetch(source);
      if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${source}`);
      const blob = await resp.blob();
      file = new File([blob], sourceName);
    }

    console.log(`[loadParquet] ${sourceName}: ${file.size} bytes`);

    // Use the streaming API — exactly like geoparquet-visualizer
    const parquetFile = await parquet.ParquetFile.fromFile(file);
    const recordBatchStream = await parquetFile.stream();
    const reader = recordBatchStream.getReader();

    const features = [];
    let batchCount = 0;
    let totalProcessed = 0;

    // Detect geometry column from first row
    let geometryColumnName = null;

    while (true) {
      const { done, value: wasmRecordBatch } = await reader.read();
      if (done) break;

      const ipcStream = wasmRecordBatch.intoIPCStream();
      const table = arrow.tableFromIPC(ipcStream);
      const rowArray = table.toArray();

      // Detect geometry column on first batch
      if (!geometryColumnName && rowArray.length > 0) {
        const firstRow = rowArray[0].toJSON();
        const commonNames = ["geometry", "geom", "wkb_geometry", "shape", "wkb", "geo_shape"];
        for (const name of commonNames) {
          if (firstRow[name] instanceof Uint8Array) {
            geometryColumnName = name;
            break;
          }
        }
        if (!geometryColumnName) {
          // Fallback: look for any Uint8Array column
          for (const [key, val] of Object.entries(firstRow)) {
            if (val instanceof Uint8Array) {
              geometryColumnName = key;
              break;
            }
          }
        }
        console.log(`[loadParquet] Detected geometry column: ${geometryColumnName}`);
      }

      for (const rowObject of rowArray) {
        const jsonData = rowObject.toJSON();
        const row = {};

        // Convert to plain JS, handling Uint8Array and BigInt
        for (const [key, value] of Object.entries(jsonData)) {
          if (value instanceof Uint8Array) {
            row[key] = new Uint8Array(value);
          } else if (typeof value === "bigint") {
            row[key] = Number(value);
          } else if (value && typeof value.toJSON === "function") {
            // Arrow StructRow — recurse
            const plain = {};
            const inner = value.toJSON();
            for (const [k, v] of Object.entries(inner)) {
              plain[k] = typeof v === "bigint" ? Number(v) : v;
            }
            row[key] = plain;
          } else {
            row[key] = value;
          }
        }

        // Parse geometry
        let geometry = null;
        if (geometryColumnName && row[geometryColumnName] instanceof Uint8Array) {
          const wkb = row[geometryColumnName];
          const buffer = wkb.buffer.slice(wkb.byteOffset, wkb.byteOffset + wkb.byteLength);
          geometry = parseWKB(buffer);
        }

        // Fallback: lon/lat columns
        if (!geometry) {
          const lon = row.lon || row.longitude || row.lng;
          const lat = row.lat || row.latitude;
          if (typeof lon === "number" && typeof lat === "number" && !isNaN(lon) && !isNaN(lat)) {
            geometry = { type: "Point", coordinates: [lon, lat] };
          }
        }

        if (geometry) {
          const properties = { ...row };
          if (geometryColumnName) delete properties[geometryColumnName];
          delete properties.geometry;
          delete properties.geometry_bbox;

          features.push({
            type: "Feature",
            id: totalProcessed,
            geometry,
            properties
          });
        }
        totalProcessed++;
      }

      batchCount++;
      if (onProgress) onProgress(batchCount, totalProcessed);
      console.log(`[loadParquet] Batch ${batchCount}: ${totalProcessed} features so far`);
    }

    console.log(`[loadParquet] Done: ${features.length} features in ${batchCount} batches`);
    return { type: "FeatureCollection", features };
  }

  // ═══════════════════════════════════════════════════════════
  // STEP 4: MAP + LAYERS + FILTERS
  // ═══════════════════════════════════════════════════════════
  const UPTD_COLORS = {
    "UPTD-I": "#e41a1c", "UPTD-II": "#377eb8",
    "UPTD-III": "#4daf4a", "UPTD-IV": "#984ea3",
  };
  const UPTD_DEFAULT = "#999999";

  const map = new maplibregl.Map({
    container: "map",
    style: "https://tiles.openfreemap.org/styles/liberty",
    center: [107.6, -6.9],
    zoom: 9,
  });
  map.addControl(new maplibregl.NavigationControl(), "bottom-right");
  map.addControl(new maplibregl.ScaleControl({ maxWidth: 200 }), "bottom-left");

  let roadsGeoJSON = null;
  let activeFilters = new Set();

  // DOM
  const fileDrop = $("file-drop");
  const fileInput = $("file-input");
  const fileStatus = $("file-status");

  // ─── File drop ────────────────────────────────────────────
  fileDrop.addEventListener("click", (e) => { e.stopPropagation(); fileInput.click(); });
  fileInput.addEventListener("change", async (e) => {
    if (e.target.files.length) await handleFiles(e.target.files);
  });

  let dragCounter = 0;
  document.body.addEventListener("dragenter", (e) => { e.preventDefault(); dragCounter++; $("drop-overlay").classList.add("active"); });
  document.body.addEventListener("dragleave", (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; $("drop-overlay").classList.remove("active"); } });
  document.body.addEventListener("dragover", (e) => { e.preventDefault(); });
  document.body.addEventListener("drop", async (e) => {
    e.preventDefault(); dragCounter = 0;
    $("drop-overlay").classList.remove("active");
    if (e.dataTransfer.files.length) await handleFiles(e.dataTransfer.files);
  });

  async function handleFiles(files) {
    const fileArr = Array.from(files);
    const roadsFile = fileArr.find(f => f.name.includes("jalan") || f.name.includes("ruas"));

    if (!roadsFile) {
      fileStatus.className = "status err";
      fileStatus.textContent = "Need ruas_jalan.parquet";
      return;
    }

    try {
      fileStatus.className = "status loading";
      fileStatus.textContent = `Loading ${roadsFile.name} (streaming)...`;
      roadsGeoJSON = await loadParquetToGeoJSON(roadsFile, (batch, total) => {
        fileStatus.textContent = `Roads: batch ${batch}, ${total} features...`;
      });
      addRoadsLayer();
      fileDrop.classList.add("loaded");
      fileStatus.className = "status ok";
      fileStatus.textContent = `Loaded ${roadsGeoJSON.features.length} ruas jalan`;
      showUI();
      setTimeout(updateStats, 100);
      fitBounds();
    } catch (err) {
      console.error("handleFiles error:", err);
      fileStatus.className = "status err";
      fileStatus.textContent = `Error: ${err.message}`;
    }
  }

  // ─── Layers ───────────────────────────────────────────────
  let selectedRoadId = null;

  function selectRoad(feature) {
    selectedRoadId = feature.id;
    if (map.getLayer("roads-selected")) {
      map.setFilter("roads-selected", ["==", ["id"], selectedRoadId]);
    }
  }

  function deselectRoad() {
    selectedRoadId = null;
    if (map.getLayer("roads-selected")) {
      map.setFilter("roads-selected", ["==", ["id"], -999]);
    }
  }

  function addRoadsLayer(forceReadd = false) {
    if (!forceReadd && map.getSource("roads")) {
      map.getSource("roads").setData(roadsGeoJSON);
      return;
    }
    if (map.getSource("roads")) {
      ["roads-hitbox","roads-line","roads-selected"].forEach(id => {
        if (map.getLayer(id)) map.removeLayer(id);
      });
      map.removeSource("roads");
    }

    map.addSource("roads", { type: "geojson", data: roadsGeoJSON });

    map.addLayer({
      id: "roads-hitbox", type: "line", source: "roads",
      layout: { "line-join": "round", "line-cap": "round" },
      paint: { "line-color": "transparent", "line-width": 14 }
    });
    map.addLayer({
      id: "roads-line", type: "line", source: "roads",
      layout: { "line-join": "round", "line-cap": "round" },
      paint: {
        "line-color": [
          "match", ["get", "unit_kerja_kode"],
          "UPTD-I", UPTD_COLORS["UPTD-I"], "UPTD-II", UPTD_COLORS["UPTD-II"],
          "UPTD-III", UPTD_COLORS["UPTD-III"], "UPTD-IV", UPTD_COLORS["UPTD-IV"],
          UPTD_DEFAULT
        ],
        "line-width": ["interpolate", ["linear"], ["zoom"], 8, 1, 12, 2.5, 16, 4, 20, 6],
        "line-opacity": 0.85
      }
    });
    map.addLayer({
      id: "roads-selected", type: "line", source: "roads",
      layout: { "line-join": "round", "line-cap": "round" },
      filter: ["==", ["id"], -999],
      paint: {
        "line-color": "#00e5ff",
        "line-width": ["interpolate", ["linear"], ["zoom"], 8, 4, 12, 7, 16, 10, 20, 14],
        "line-opacity": 1
      }
    });

    let hoveredRoadId = null;
    map.on("mouseenter", "roads-hitbox", () => { map.getCanvas().style.cursor = "pointer"; });
    map.on("mousemove", "roads-hitbox", (e) => {
      if (!e.features.length) return;
      if (hoveredRoadId !== null) map.setFeatureState({ source: "roads", id: hoveredRoadId }, { hover: false });
      hoveredRoadId = e.features[0].id;
      map.setFeatureState({ source: "roads", id: hoveredRoadId }, { hover: true });
    });
    map.on("mouseleave", "roads-hitbox", () => {
      map.getCanvas().style.cursor = "";
      if (hoveredRoadId !== null) { map.setFeatureState({ source: "roads", id: hoveredRoadId }, { hover: false }); hoveredRoadId = null; }
    });

    map.on("click", "roads-hitbox", (e) => {
      e.preventDefault();
      if (!e.features.length) return;
      const feature = e.features[0];
      const p = feature.properties;
      const color = UPTD_COLORS[p.unit_kerja_kode] || UPTD_DEFAULT;

      selectRoad(feature);

      const coords = feature.geometry.coordinates;
      const bounds = new maplibregl.LngLatBounds();
      coords.forEach(c => bounds.extend(c));
      map.fitBounds(bounds, { padding: 80, maxZoom: 16, duration: 800 });

      const mid = coords[Math.floor(coords.length / 2)];
      setTimeout(() => {
        new maplibregl.Popup({ maxWidth: "320px" })
          .setLngLat(mid)
          .setHTML(`<div>
            <b style="font-size:14px;">${p.nama || "Jalan"}</b><br/>
            <span style="color:#94a3b8;">${p.kode_number || ""}</span><br/><br/>
            <b>Kode:</b> ${p.kode || "N/A"}<br/>
            <b>Panjang:</b> ${p.panjang_km || "N/A"} km<br/>
            <b>Status:</b> ${p.status || "N/A"}<br/>
            <b>UPTD:</b> <span style="color:${color};font-weight:700;">${p.unit_kerja_kode || "N/A"}</span><br/>
            <b>Lokasi:</b> ${p.lokasi_kode || "N/A"}
          </div>`)
          .addTo(map);
      }, 900);
    });

    map.on("click", (e) => {
      if (e.defaultPrevented) return;
      deselectRoad();
    });
  }

  // ─── Filters ──────────────────────────────────────────────
  // ─── Show UI ──────────────────────────────────────────────
  function showUI() {
    $("panel").style.display = "block";
    $("uptd-section").style.display = "block";
    $("legend").style.display = "block";

    if (roadsGeoJSON) {
      const codes = {};
      roadsGeoJSON.features.forEach(f => {
        const c = f.properties.unit_kerja_kode;
        if (c) codes[c] = (codes[c] || 0) + 1;
      });
      const list = $("uptd-list"); list.innerHTML = "";
      const legendRoads = $("legend-roads"); legendRoads.innerHTML = "";

      Object.entries(codes).sort().forEach(([code, count]) => {
        activeFilters.add(code);
        const color = UPTD_COLORS[code] || UPTD_DEFAULT;
        const item = document.createElement("label");
        item.className = "uptd-item";
        item.style.setProperty("--uptd-color", color);
        item.innerHTML = `<input type="checkbox" checked data-code="${code}" /><span class="color-dot"></span><span class="name">${code}</span><span class="count">${count} roads</span>`;
        item.querySelector("input").addEventListener("change", (e) => {
          if (e.target.checked) activeFilters.add(code); else activeFilters.delete(code);
          updateRoadVisibility();
        });
        list.appendChild(item);
        const row = document.createElement("div");
        row.className = "legend-row";
        row.innerHTML = `<span class="legend-color" style="background:${color}"></span><span>${code}</span>`;
        legendRoads.appendChild(row);
      });
    }
  }

  function updateRoadVisibility() {
    if (!map.getLayer("roads-line")) return;
    const filter = activeFilters.size >= 4 ? null : ["in", ["get", "unit_kerja_kode"], ["literal", Array.from(activeFilters)]];
    map.setFilter("roads-line", filter);
    map.setFilter("roads-hitbox", filter);
  }

  function updateStats() {
    console.log("updateStats: roadsGeoJSON =", roadsGeoJSON);
    console.log("updateStats: features count =", roadsGeoJSON?.features?.length);
    if (roadsGeoJSON?.features?.length > 0) {
      console.log("updateStats: first feature =", roadsGeoJSON.features[0]);
      console.log("updateStats: first feature properties =", roadsGeoJSON.features[0].properties);
      $("stat-roads").textContent = roadsGeoJSON.features.length.toLocaleString();
      const totalKm = roadsGeoJSON.features.reduce((sum, f) => {
        const val = parseFloat(f.properties?.panjang_km);
        console.log("panjang_km:", f.properties?.panjang_km, "-> parsed:", val);
        return sum + (val || 0);
      }, 0);
      $("stat-km").textContent = totalKm.toFixed(1);
      const uptdSet = new Set();
      roadsGeoJSON.features.forEach(f => { if (f.properties?.unit_kerja_kode) uptdSet.add(f.properties.unit_kerja_kode); });
      $("stat-uptd").textContent = uptdSet.size;
      const kabSet = new Set();
      roadsGeoJSON.features.forEach(f => { if (f.properties?.kode) kabSet.add(f.properties.kode); });
      $("stat-kab").textContent = kabSet.size;
      $("road-badge").textContent = roadsGeoJSON.features.length.toLocaleString();
    } else {
      console.log("updateStats: no features to process");
    }
  }

  function fitBounds() {
    const coords = [];
    if (roadsGeoJSON) roadsGeoJSON.features.forEach(f => {
      const flat = f.geometry.coordinates.flat(2);
      for (let i = 0; i < flat.length; i += 2) coords.push([flat[i], flat[i+1]]);
    });
    if (coords.length) {
      const bounds = new maplibregl.LngLatBounds();
      coords.forEach(c => bounds.extend(c));
      map.fitBounds(bounds, { padding: 40 });
    }
  }

  // ─── SEARCH ──────────────────────────────────────────────
  const searchInput = $("search-input");
  const searchDropdown = $("search-dropdown");
  let coordMarker = null;

  searchInput.addEventListener("focus", () => { $("search-box").classList.add("has-focus"); });
  searchInput.addEventListener("blur", () => { setTimeout(() => $("search-box").classList.remove("has-focus"), 150); });

  searchInput.addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (q.length < 2) { searchDropdown.style.display = "none"; return; }
    if (!roadsGeoJSON) return;

    // Check if it's a coordinate input (lat, lng or lng, lat)
    const coordMatch = q.match(/^-?\d+\.?\d*\s*[,\s]\s*-?\d+\.?\d*$/);
    if (coordMatch) {
      const parts = q.split(/[,\s]+/).map(Number);
      let lat, lng;
      if (Math.abs(parts[0]) <= 90 && Math.abs(parts[1]) <= 180) {
        lat = parts[0]; lng = parts[1];
      } else if (Math.abs(parts[0]) <= 180 && Math.abs(parts[1]) <= 90) {
        lng = parts[0]; lat = parts[1];
      } else {
        searchDropdown.style.display = "none";
        return;
      }
      searchDropdown.innerHTML = `
        <div class="search-item" data-lat="${lat}" data-lng="${lng}" data-type="coord">
          <div class="s-name">📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
          <div class="s-meta">Klik untuk menampilkan di peta</div>
        </div>`;
      searchDropdown.style.display = "block";
      return;
    }

    // Search roads by name or kode
    const results = roadsGeoJSON.features.filter(f => {
      const name = (f.properties.nama || "").toLowerCase();
      const kode = (f.properties.kode_number || "").toLowerCase();
      const code = (f.properties.kode || "").toLowerCase();
      return name.includes(q) || kode.includes(q) || code.includes(q);
    }).slice(0, 15);

    if (results.length === 0) {
      searchDropdown.innerHTML = `<div class="search-empty">Tidak ditemukan</div>`;
      searchDropdown.style.display = "block";
      return;
    }

    searchDropdown.innerHTML = results.map((f, i) => {
      const p = f.properties;
      const color = UPTD_COLORS[p.unit_kerja_kode] || UPTD_DEFAULT;
      return `<div class="search-item" data-idx="${i}">
        <div class="s-name">${p.nama || "Jalan"}
          <span class="s-uptd" style="background:${color};color:#fff;">${p.unit_kerja_kode || "?"}</span>
        </div>
        <div class="s-meta">${p.kode_number || ""} &middot; ${p.panjang_km || "?"} km &middot; ${p.kode || ""}</div>
      </div>`;
    }).join("");
    searchDropdown.style.display = "block";

    // Store results for click handling
    searchDropdown._results = results;
  });

  searchDropdown.addEventListener("click", (e) => {
    const item = e.target.closest(".search-item");
    if (!item) return;

    const type = item.dataset.type;
    if (type === "coord") {
      const lat = parseFloat(item.dataset.lat);
      const lng = parseFloat(item.dataset.lng);
      placeCoordMarker(lng, lat);
    } else {
      const idx = parseInt(item.dataset.idx);
      const feature = searchDropdown._results[idx];
      if (feature) {
        selectRoad(feature);

        const coords = feature.geometry.coordinates;
        const bounds = new maplibregl.LngLatBounds();
        coords.forEach(c => bounds.extend(c));
        map.fitBounds(bounds, { padding: 80, maxZoom: 16, duration: 800 });

        const mid = coords[Math.floor(coords.length / 2)];
        const p = feature.properties;
        const color = UPTD_COLORS[p.unit_kerja_kode] || UPTD_DEFAULT;
        setTimeout(() => {
          new maplibregl.Popup({ maxWidth: "320px" })
            .setLngLat(mid)
            .setHTML(`<div>
              <b style="font-size:14px;">${p.nama || "Jalan"}</b><br/>
              <span style="color:#94a3b8;">${p.kode_number || ""}</span><br/><br/>
              <b>Kode:</b> ${p.kode || "N/A"}<br/>
              <b>Panjang:</b> ${p.panjang_km || "N/A"} km<br/>
              <b>UPTD:</b> <span style="color:${color};font-weight:700;">${p.unit_kerja_kode || "N/A"}</span><br/>
              <b>Lokasi:</b> ${p.lokasi_kode || "N/A"}
            </div>`)
            .addTo(map);
        }, 900);
      }
    }

    searchDropdown.style.display = "none";
    searchInput.value = "";
  });

  function placeCoordMarker(lng, lat) {
    if (coordMarker) coordMarker.remove();
    const el = document.createElement("div");
    el.className = "coord-marker";
    el.title = `${lat}, ${lng}`;
    coordMarker = new maplibregl.Marker({ element: el })
      .setLngLat([lng, lat])
      .setPopup(new maplibregl.Popup({ maxWidth: "280px" }).setHTML(`
        <div>
          <b>📍 Koordinat</b><br/>
          <span style="color:#94a3b8;">Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}</span><br/><br/>
          <span style="font-size:11px;color:#64748b;">Periksa secara visual apakah titik ini berada di jalan provinsi.</span>
        </div>
      `))
      .addTo(map);
    map.flyTo({ center: [lng, lat], zoom: 15, duration: 1000 });
    setTimeout(() => coordMarker.togglePopup(), 1100);
  }

  // Close dropdown on outside click
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#search-box")) searchDropdown.style.display = "none";
  });

  // ─── THEME TOGGLE ──────────────────────────────────────────
  const MAP_STYLES = {
    dark: "https://tiles.openfreemap.org/styles/liberty",
    light: "https://tiles.openfreemap.org/styles/bright"
  };

  let isSwitchingTheme = false;

  function setTheme(theme) {
    if (isSwitchingTheme) return;
    isSwitchingTheme = true;
    document.body.classList.toggle("light", theme === "light");
    $("theme-btn").textContent = theme === "dark" ? "🌙" : "☀️";

    const onStyleLoaded = () => {
      if (roadsGeoJSON && !map.getSource("roads")) {
        addRoadsLayer(true);
      }
      isSwitchingTheme = false;
    };

    map.once("style.load", onStyleLoaded);
    map.setStyle(MAP_STYLES[theme]);

    setTimeout(() => {
      if (isSwitchingTheme && roadsGeoJSON && !map.getSource("roads")) {
        map.off("style.load", onStyleLoaded);
        addRoadsLayer(true);
        isSwitchingTheme = false;
      }
    }, 2000);
  }

  let currentTheme = "dark";
  $("theme-btn").addEventListener("click", () => {
    currentTheme = currentTheme === "dark" ? "light" : "dark";
    setTheme(currentTheme);
  });

  // ─── INIT DONE ────────────────────────────────────────────
  $("loading").classList.add("hidden");
  loadStatus.textContent = "";
  console.log("All dependencies loaded. Ready for data.");

  // Auto-load from server
  map.on("load", async () => {
    try {
      const roadsResp = await fetch("ruas_jalan.parquet");
      if (roadsResp.ok) {
        console.log("Auto-loading ruas_jalan.parquet...");
        roadsGeoJSON = await loadParquetToGeoJSON("ruas_jalan.parquet");
        console.log("Auto-load: roadsGeoJSON.features.length =", roadsGeoJSON.features.length);
        if (roadsGeoJSON.features.length > 0) {
          console.log("Auto-load: first feature =", roadsGeoJSON.features[0]);
          console.log("Auto-load: first feature.properties =", roadsGeoJSON.features[0].properties);
        } else {
          console.log("Auto-load: WARNING - no features loaded!");
        }
        addRoadsLayer();
        fileDrop.classList.add("loaded");
        fileStatus.className = "status ok";
        fileStatus.textContent = `Auto-loaded ${roadsGeoJSON.features.length} ruas jalan`;
        showUI();
        setTimeout(() => {
          console.log("Calling updateStats after delay...");
          updateStats();
        }, 500);
        fitBounds();
      }
    } catch (e) {
      console.log("Auto-load error:", e.message, e.stack);
    }
  });
</script>
</body>
</html>
